version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE-THIS-STRONG-PASSWORD-IN-PRODUCTION}
      POSTGRES_DB: telegram_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tguser -d telegram_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Xavfsizlik: resource limitlar
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tg_backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tguser
      DB_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE-THIS-STRONG-PASSWORD-IN-PRODUCTION}
      DB_NAME: telegram_db
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-CHANGE-THIS-IN-PRODUCTION-MUST-BE-VERY-STRONG-32CHARS}
      JWT_ISSUER: ${JWT_ISSUER:-telegram-clone-backend}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-72}
      APP_ENV: ${APP_ENV:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:19006,http://localhost:8081,http://localhost:8082,https://localhost:8082,http://localhost:3000,http://10.215.100.145:8084,http://10.215.100.145:8082}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-5}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-40}
      SERVER_PORT: 8084
      UPLOAD_DIR: /app/uploads
    ports:
      - "8084:8084"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    # Xavfsizlik: resource limitlar  
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  turn:
    image: coturn/coturn:latest
    container_name: tg_turn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./turn/turnserver.conf:/etc/coturn/turnserver.conf

volumes:
  pg_data:
  uploads_data:
